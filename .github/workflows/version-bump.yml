name: Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/VERSION'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed skills and bump versions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CHANGED=false
          for skill_dir in */; do
            skill="${skill_dir%/}"
            [ -f "$skill/VERSION" ] || continue
            [ -f "$skill/SKILL.md" ] || continue

            if git diff --name-only HEAD~1 HEAD -- "$skill/" | grep -qv "VERSION"; then
              CURRENT=$(cat "$skill/VERSION")
              NEXT=$((CURRENT + 1))
              echo "$NEXT" > "$skill/VERSION"
              git add "$skill/VERSION"
              echo "Bumped $skill: $CURRENT → $NEXT"
              CHANGED=true
            fi
          done

          if [ "$CHANGED" = true ]; then
            SKILLS=$(git diff --cached --name-only | sed 's|/VERSION||' | paste -sd, -)
            git commit -m "bump($SKILLS): version"
            git push
          else
            echo "No skill changes detected"
          fi
